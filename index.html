<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Fast Log Viewer</title>
    <style>
        body { font-family: 'Consolas', monospace; background-color: #1e1e1e; color: #d4d4d4; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        header { padding: 10px 20px; background: #333; display: flex; gap: 10px; align-items: center; border-bottom: 1px solid #444; }
        #log-container { flex: 1; overflow-y: auto; padding: 10px; white-space: pre-wrap; word-break: break-all; line-height: 1.5; }
        .log-line { border-bottom: 1px solid #2d2d2d; padding: 2px 0; }
        .error { color: #ff5555; font-weight: bold; }
        .warning { color: #ffb86c; }
        .highlight { background-color: #f1c40f; color: #000; }
        footer { padding: 10px 20px; background: #333; border-top: 1px solid #444; position: sticky; bottom: 0; }
        input[type="text"] { width: 100%; padding: 8px; background: #252526; border: 1px solid #444; color: white; }
        button { cursor: pointer; padding: 5px 15px; background: #007acc; border: none; color: white; border-radius: 3px; }
        button:hover { background: #005a9e; }
    </style>
</head>
<body>

<header>
    <input type="file" id="fileInput" accept=".txt,.log">
    <button onclick="sortLogs()">날짜/시간순 정렬</button>
    <span id="status">파일을 선택해주세요.</span>
</header>

<div id="log-container"></div>

<footer>
    <input type="text" id="searchInput" placeholder="검색 키워드 입력 시 해당 로그만 표시 (Enter)...">
</footer>

<script>
    let logData = []; // 원본 로그 데이터 저장

    const fileInput = document.getElementById('fileInput');
    const logContainer = document.getElementById('log-container');
    const searchInput = document.getElementById('searchInput');
    const status = document.getElementById('status');

    // 1. 파일 읽기
    fileInput.addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = (event) => {
            const content = event.target.result;
            logData = content.split('\n').filter(line => line.trim() !== '');
            status.innerText = `총 ${logData.length}개 라인 로드됨`;
            renderLogs(logData);
        };
        reader.readAsText(file);
    });

    // 2. 로그 렌더링 (색상 입히기 포함)
    function renderLogs(data) {
        logContainer.innerHTML = '';
        const fragment = document.createDocumentFragment();

        data.forEach(line => {
            const div = document.createElement('div');
            div.className = 'log-line';
            
            // 대소문자 구분 없이 색상 적용
            let formattedLine = line
                .replace(/(error)/gi, '<span class="error">$1</span>')
                .replace(/(warning)/gi, '<span class="warning">$1</span>');
            
            div.innerHTML = formattedLine;
            fragment.appendChild(div);
        });
        
        logContainer.appendChild(fragment);
    }

    // 3. 정렬 기능 (날짜:시간:시간대 기준)
    function sortLogs() {
        status.innerText = "정렬 중...";
        setTimeout(() => {
            logData.sort((a, b) => {
                const timeA = a.match(/\[(.*?)\]/);
                const timeB = b.match(/\[(.*?)\]/);
                if (timeA && timeB) {
                    return timeA[1].localeCompare(timeB[1]);
                }
                return 0;
            });
            renderLogs(logData);
            status.innerText = "정렬 완료";
        }, 10);
    }

    // 4. 필터링 기능
    searchInput.addEventListener('input', (e) => {
        const keyword = e.target.value.toLowerCase();
        if (!keyword) {
            renderLogs(logData);
            return;
        }

        const filtered = logData.filter(line => line.toLowerCase().includes(keyword));
        renderLogs(filtered);
    });
</script>

</body>
</html>
