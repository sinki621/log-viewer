name: Build Log Viewer

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          # 캐싱 기능을 끄거나 requirements.txt 위치를 명시하여 에러 방지
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build Single EXE
        # --hidden-import를 추가하여 chardet이 누락되지 않도록 강제 포함
        run: |
          pyinstaller --onefile --noconsole --hidden-import=chardet -n "LogViewer" main.py

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: LogViewer-Portable
          path: dist/LogViewer.exe
