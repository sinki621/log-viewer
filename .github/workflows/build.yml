name: Build Portable Log Viewer

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          # cache: 'pip' 부분을 제거했습니다. (에러 원인 해결)

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pywebview pyinstaller

      - name: Build Single EXE
        run: |
          pyinstaller --onefile --noconsole -n "FastLogViewer" main.py

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: FastLogViewer-Portable
          path: dist/FastLogViewer.exe
