name: Build Compact Single EXE

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install pywebview pyinstaller

      - name: Build Single EXE
        # --onefile: 단일 exe 생성 / --noconsole: 실행 시 터미널 숨김 / --add-data: html 포함
        run: |
          pyinstaller --onefile --noconsole --add-data "index.html;." main.py

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: LogViewer-Compact
          path: dist/main.exe
