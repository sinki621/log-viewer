name: Build Log Viewer

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pywebview pyinstaller

      - name: Build Single EXE
        # 실행 파일 이름을 LogViewer.exe로 설정
        run: |
          pyinstaller --onefile --noconsole -n "LogViewer" main.py

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: LogViewer-Portable
          path: dist/LogViewer.exe
