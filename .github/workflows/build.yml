name: Build Log Viewer

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          # cache 설정을 삭제하여 requirements.txt 파일 탐색 에러 원천 차단

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pywebview pyinstaller chardet

      - name: Build Single EXE
        run: |
          pyinstaller --onefile --noconsole --collect-all chardet -n "LogViewer" main.py

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: LogViewer-Portable
          path: dist/LogViewer.exe
