name: Build Log Viewer

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # 프로젝트 루트의 requirements.txt를 읽어 필요한 라이브러리 설치
          if (Test-Path requirements.txt) {
            pip install -r requirements.txt
          } else {
            # 파일이 없을 경우를 대비해 핵심 라이브러리 강제 설치
            pip install pywebview pyinstaller chardet
          }

      - name: Build Single EXE
        # --collect-all 옵션은 chardet 내부의 모든 데이터를 포함시켜 런타임 에러를 방지합니다.
        run: |
          pyinstaller --onefile --noconsole --collect-all chardet -n "LogViewer" main.py

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: LogViewer-Portable
          path: dist/LogViewer.exe
