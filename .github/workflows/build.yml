name: Build Portable Log Viewer

on:
  push:
    branches: [ "main" ]  # main 브랜치에 푸시될 때마다 실행
  workflow_dispatch:      # 수동으로 실행하고 싶을 때 사용

jobs:
  build:
    runs-on: windows-latest  # .exe 빌드를 위해 윈도우 환경 사용

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          cache: 'pip' # 빌드 속도 향상을 위한 캐싱

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pywebview pyinstaller

      - name: Build Single EXE
        # --onefile: 모든 파일을 하나로 합침
        # --noconsole: 실행 시 검은색 터미널 창이 뜨지 않게 함
        # -n: 생성될 파일 이름 설정
        run: |
          pyinstaller --onefile --noconsole -n "FastLogViewer" main.py

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: FastLogViewer-Portable
          path: dist/FastLogViewer.exe
